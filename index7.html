<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Results Tracker</title>
<link rel="stylesheet" href="style2.css">
<link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;700&family=Paytone+One&display=swap" rel="stylesheet">
<style> #trackerdescription{margin-bottom: 10px ; } 


#modalContent {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  max-width: 350px;   /* limit horizontal width */
  width: 90%;         /* responsive: will shrink on small screens */
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  margin: auto;       /* center horizontally */
  position: relative;
}
#viewbtn{
  color: #EF5B9C;
  text-decoration: underline;

}

#viewbtn:hover {
  color: #FFE865;
}

/* =========================
Section Toggle (Products)
========================= */

.section-header {
position: relative;
display: flex;
justify-content: center;
align-items: center;
margin-bottom: 20px;
}

/* Arrow button */
.toggle-arrow {
position: absolute;
right: 10px;
top: 0px;
background: none;
border: none;
font-size: 18px;
cursor: pointer;
color: #EF5B9C;
display: flex;
align-items: center;
justify-content: center;
width: 36px;
height: 36px;
transition: transform 0.3s ease;
margin-top: -10px;
}

/* Collapsed state */
.collapsed #topProducts,
.collapsed #productList {
display: none;
}

#savedProductsCard .toggle-arrow {
  color: #6E9AC4; /* pick your color */
}

#productList .product-entry {
  border: 2px solid #6E9AC4; /* your new color */
}

/* Close (X) button */
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 25px;
  font-weight: bold;
  color: #EF5B9C;
  cursor: pointer;
  z-index: 10;
  margin-top: -10px;
}

.close-btn:hover {
  color: #FFE865;
}

#productdetailstitle{
  color: #EF5B9C;
  font-family: 'Paytone One', sans-serif;

}


/* Base row */
.top-product-row {
  display: flex;
  align-items: center;
  padding: 0px;
}

/* Fixed image container (THIS is the key) */
.image-slot {
  width: 70px;         /* SAME as image width */
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* Image styling */
.image-slot img {
  width: 70px;
  height: 70px;
  object-fit: cover;
  border-radius: 8px;
}

/* Text */
.top-product-name {
  margin-left: 25px;   /* consistent spacing from image */
  font-size: 16px;
  font-weight: 600;
  color: #344354;
  max-width: 250px;
  word-wrap: break-word;
  line-height: 1.3;
}

/* When NO image → center text perfectly */
.top-product-row.no-image {
  justify-content: center;
}

.top-product-row.no-image .top-product-name {
  margin-left: 0;
  text-align: center;
}

#productDetails p {
  margin: 6px 0;
}

#productDetails strong {
  color: #344354;
}

#productDetails span,
#productDetails p {
  font-size: 14px;
}

#productDetails {
  text-align: left; /* cleaner layout for ratings */
}

/* Style the stars */
#productDetails p {
  letter-spacing: 1px;
}

/* --------------------
Mobile adjustments for toggle arrows
-------------------- */
@media (max-width: 768px) {
  .toggle-arrow {
    width: 24px;       /* smaller square */
    height: 24px;      /* smaller square */
    font-size: 14px;   /* smaller arrow symbol */
    top: -15px;          /* adjust vertical position */
    right: -10px;        /* adjust horizontal position if needed */
    margin-top: 0;
    margin-bottom: 20px;
  }
  .top-rated{
    margin-top: 15px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <!--  <a href="index.html" class="home-icon" title="Go Home">
     <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="home-svg">
     <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5z" />
     </svg> 
    </a> -->
    <h1 id="titleprt">Product Results Tracker</h1>
    <p id="trackerdescription"> Log hair products you’ve tried and 
      track how much you like or dislike them</p>
    <div class="button-wrapper">
      <a href="index8.html"><button>Add New Product</button></a>
    </div>
  </div>

<div class="card" id="topProductsCard">
<div class="section-header">
<h3 class="top-rated" style="color:#EF5B9C; font-family: 'Paytone One', sans-serif; margin-bottom: 10px;"> 🔥 Top Rated Products</h3>
<button class="toggle-arrow" id="toggleTopProducts">&#9660;</button>
</div>
<div id="topProducts"></div>
</div>

 <div class="card" id="savedProductsCard">
<div class="section-header">
<h3 id="savedProductstitle" style="font-family: 'Paytone One', sans-serif;">Saved Products</h3>
<button class="toggle-arrow" id="toggleSavedProducts">&#9660;</button>
</div>
<div id="productList"></div>
</div>

<!-- Modal -->
<div id="modalOverlay">
  <div id="modalContent">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h3 id="productdetailstitle">Product Details</h3>
    <div id="productDetails"></div>
    <div class="button-wrapper">
      <a href="#" id="editBtn" class="modal-btn">Edit</a>
      <a href="#" id="deleteBtn" class="modal-btn">Delete</a>
    </div>
  </div>
</div>
<!-- <button onclick="localStorage.clear(); location.reload();">Reset Data</button> -->

<script>
function loadProducts() { return JSON.parse(localStorage.getItem("products")) || []; }
function saveProducts(products) { localStorage.setItem("products", JSON.stringify(products)); }

let products = loadProducts();
let currentIndex = null;

function calculateRepurchase(p) {
  const { moisture, definition, noBuildup, overall } = p.ratings;
  return Math.round(((moisture + definition + noBuildup + overall)/20)*100);
}

function renderProducts() {
  const list = document.getElementById("productList");
  list.innerHTML = "";
  if (products.length === 0) {
    list.innerHTML = "<p style='text-align:center;'>No products saved yet.</p>";
    return;
  }

  products.forEach((p, index) => {
    const repurchase = calculateRepurchase(p);

    // Determine bar color based on percentage
    let barColor = "#67B271";
    if (repurchase < 30) barColor = "#EF5B9C";
    else if (repurchase < 60) barColor = "#FFAF65";
    else if (repurchase < 80) barColor = "#FFE865";

    const div = document.createElement("div");
    div.className = "product-entry";
    const imageHTML = p.image 
  ? `<img src="${p.image}" class="product-thumb" onclick="expandImage('${p.image}')">` 
  : "";

div.innerHTML = `
${imageHTML}
<div><strong>${p.brand} - ${p.name}</strong></div>
<div>
Repurchase Likelihood:
<div class="repurchase-bar">
<div class="repurchase-fill" style="width:${repurchase}%; background:${barColor};"></div>
</div>
<small>${repurchase}%</small>
</div>
<div class="button-wrapper">
<a id="viewbtn" style="font-size:12px;" onclick="viewProduct(${index})">View</a>
</div>
`;
    list.appendChild(div);
  });
}


function renderStars(rating) {
  let stars = "";
  for(let i=1;i<=5;i++){ stars += i<=rating?"★":"☆"; }
  return stars;
}

function viewProduct(index){
  currentIndex=index;
  const p=products[index];
  const detailsDiv=document.getElementById("productDetails");
  const imageHTML = p.image 
  ? `<img src="${p.image}" class="product-thumb" onclick="expandImage('${p.image}')">` 
  : "";

detailsDiv.innerHTML = `
${imageHTML}

<p><strong>Name:</strong> ${p.name}</p>
<p><strong>Brand:</strong> ${p.brand}</p>
<p><strong> Date Used:</strong> ${p.date}</p>

<p><strong>Moisture:</strong> ${renderStars(p.ratings.moisture).replace(/★/g, '<span style="color:#EF5B9C;">★</span>')}</p>
<p><strong>Definition:</strong> ${renderStars(p.ratings.definition).replace(/★/g, '<span style="color:#EF5B9C;">★</span>')}</p>
<p><strong>No Buildup:</strong> ${renderStars(p.ratings.noBuildup).replace(/★/g, '<span style="color:#EF5B9C;">★</span>')}</p>
<p><strong>Overall:</strong> ${renderStars(p.ratings.overall).replace(/★/g, '<span style="color:#EF5B9C;">★</span>')}</p>


${p.optional?.notes ? `<p><strong>Notes:</strong> ${p.optional.notes}</p>` : ""}
`;
  document.getElementById("modalOverlay").style.display="flex";
}

function closeModal(){ document.getElementById("modalOverlay").style.display="none"; currentIndex=null; }

document.getElementById("editBtn").addEventListener("click", ()=>{
  if(currentIndex===null) return;
  window.location.href=`index8.html?edit=${currentIndex}`;
});

document.getElementById("deleteBtn").addEventListener("click", ()=>{
    if(currentIndex===null) return;
    if(confirm("Delete this product?")){
        products.splice(currentIndex,1);
        saveProducts(products);
        renderProducts();        // update saved products
        renderTopProducts();     // update top products immediately
        closeModal();
    }
});

function expandImage(src) {
  const overlay = document.createElement("div");
  overlay.style.position = "fixed";
  overlay.style.top = 0;
  overlay.style.left = 0;
  overlay.style.width = "100%";
  overlay.style.height = "100%";
  overlay.style.backgroundColor = "rgba(0,0,0,0.8)";
  overlay.style.display = "flex";
  overlay.style.justifyContent = "center";
  overlay.style.alignItems = "center";
  overlay.style.zIndex = "2000";

  const img = document.createElement("img");
  img.src = src;
  img.style.maxWidth = "90%";
  img.style.maxHeight = "90%";
  img.style.borderRadius = "10px";

  overlay.appendChild(img);
  overlay.onclick = () => overlay.remove();

  document.body.appendChild(overlay);
}

function renderTopProducts() {
  const container = document.getElementById("topProducts");
  container.innerHTML = "";

  if (products.length === 0) {
    container.innerHTML = "<p style='text-align:center;'>No products yet.</p>";
    return;
  }

  // Sort products by repurchase score (highest first)
  const sorted = [...products].sort((a, b) => 
    calculateRepurchase(b) - calculateRepurchase(a)
  );

  // Take top 3
 const top3 = sorted.slice(0, 3);

top3.forEach((p) => {
  const score = calculateRepurchase(p);

  const originalIndex = products.findIndex(prod => 
    prod.name === p.name &&
    prod.brand === p.brand &&
    prod.date === p.date
  );

  const imageHTML = p.image 
    ? `<img src="${p.image}" class="product-thumb" onclick="expandImage('${p.image}')">`
    : "";

  const div = document.createElement("div");
  div.className = "product-entry clickable-product";
  div.onclick = () => viewProduct(originalIndex);

 const hasImage = !!p.image;

div.innerHTML = `
  <div class="top-product-row ${hasImage ? "has-image" : "no-image"}">
    ${hasImage ? `
  <div class="image-slot">
    <img src="${p.image}">
  </div>
` : ""}
    <span class="top-product-name">${p.brand} - ${p.name}</span>
  </div>
`;

  container.appendChild(div);
});

}

renderProducts();
renderTopProducts();

// ---------------- TOGGLES ----------------
document.addEventListener("DOMContentLoaded", () => {
const topCard = document.getElementById("topProductsCard");
const savedCard = document.getElementById("savedProductsCard");

const topBtn = document.getElementById("toggleTopProducts");
const savedBtn = document.getElementById("toggleSavedProducts");

// Load saved state (default = expanded)
const topCollapsed = localStorage.getItem("topProductsCollapsed") === "true";
const savedCollapsed = localStorage.getItem("savedProductsCollapsed") === "true";

// Apply initial state
if (topCollapsed) {
topCard.classList.add("collapsed");
topBtn.style.transform = "rotate(-180deg)";
}

if (savedCollapsed) {
savedCard.classList.add("collapsed");
savedBtn.style.transform = "rotate(-180deg)";
}

// -------- Toggle Top Products --------
topBtn.addEventListener("click", () => {
topCard.classList.toggle("collapsed");

const isCollapsed = topCard.classList.contains("collapsed");

// Save state
localStorage.setItem("topProductsCollapsed", isCollapsed);

// Rotate arrow
topBtn.style.transform = isCollapsed ? "rotate(-180deg)" : "rotate(0deg)";
});

// -------- Toggle Saved Products --------
savedBtn.addEventListener("click", () => {
savedCard.classList.toggle("collapsed");

const isCollapsed = savedCard.classList.contains("collapsed");

// Save state
localStorage.setItem("savedProductsCollapsed", isCollapsed);

// Rotate arrow
savedBtn.style.transform = isCollapsed ? "rotate(-180deg)" : "rotate(0deg)";
});
});


</script>

</body>
</html>
